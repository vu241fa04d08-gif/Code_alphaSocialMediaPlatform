<!DOCTYPE html>
<html>
<head>
<title>Creator Hub Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    overflow:hidden;
}

.left{
    width:50%;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:50px;
}

.right{
    width:50%;
    background:#f4f7fc;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:420px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#2563eb;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.signup-link{
    text-align:center;
    margin-top:15px;
}

.signup-link a{
    text-decoration:none;
    color:#2563eb;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="left"></div>

<div class="right">
<div class="login-box">

<h2>Login</h2>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<div class="signup-link">
Don't have an account?
<a href="/login-page">Signup</a>
</div>

</div>
</div>

<script>
async function login() {

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
        alert("Please enter both email and password");
        return;
    }

    try {
        const res = await fetch("https://creators-hub-n32z.onrender.com/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const result = await res.json();

        if (!res.ok) {
            alert(result.message || "Login failed");
            return;
        }

        // save token (important for dashboard)
        if (result.token) {
            localStorage.setItem("token", result.token);
        }

        alert(result.message || "Login successful");

        // ✅ FIXED REDIRECT
        window.location.href = "/dashboard";

    } catch (error) {
        console.error(error);
        alert("Server Error. Please try again.");
    }
}
</script>

</body>
</html>
